<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>BIP39 PBKDF2</title>
</head>
<body>
  <h3>Mnemonic → Seed (PBKDF2-HMAC-SHA512)</h3>

  <textarea id="mnemonic" rows="3" cols="80"
    placeholder="Digite as 12 palavras aqui"></textarea>
  <br><br>

  <input id="passphrase" placeholder="Passphrase (opcional)" />
  <br><br>

  <button onclick="generateSeed()">Gerar seed</button>

  <pre id="output"></pre>

  <script>
    async function generateSeed() {
      const mnemonic = document.getElementById("mnemonic").value.normalize("NFKD");
      const passphrase = document.getElementById("passphrase").value.normalize("NFKD");

      const passwordBytes = new TextEncoder().encode(mnemonic);
      const saltBytes = new TextEncoder().encode("mnemonic" + passphrase);

      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        passwordBytes,
        { name: "PBKDF2" },
        false,
        ["deriveBits"]
      );

      const derivedBits = await crypto.subtle.deriveBits(
        {
          name: "PBKDF2",
          salt: saltBytes,
          iterations: 2048,
          hash: "SHA-512"
        },
        keyMaterial,
        512 // bits
      );

      const seedHex = Array.from(new Uint8Array(derivedBits))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");

      document.getElementById("output").textContent =
        "Seed (512 bits / 64 bytes):\n" + seedHex;
    }
  </script>
</body>
</html>
